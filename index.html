<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BulBul</title>
<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white}
header{display:flex;justify-content:space-between;padding:15px;background:#020617}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;padding:15px}
.card{background:#1e293b;padding:10px;border-radius:15px;transition:0.2s}
.card:hover{transform:scale(1.05)}
img{width:100%;height:150px;object-fit:cover;border-radius:10px}
button,input,select{padding:8px;margin:4px}
</style>
</head>
<body>

<header>
<h2>🔥 BulBul</h2>
<input id="search" placeholder="Ara..." oninput="load()">
</header>

<div>
<input id="email" placeholder="email">
<input id="password" placeholder="şifre">
<button onclick="login()">Login</button>
<button onclick="register()">Kayıt</button>
</div>

<div>
<input id="title" placeholder="başlık">
<input id="price" placeholder="fiyat">
<input id="img" placeholder="resim url">
<select id="cat">
<option>Elektronik</option>
<option>Araba</option>
<option>Oyun</option>
</select>
<button onclick="addListing()">Ekle</button>
</div>

<div class="grid" id="list"></div>

<script>
const API="http://localhost:3000";

function register(){fetch(API+"/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email.value,password:password.value})})}
function login(){fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email.value,password:password.value})}).then(r=>r.json()).then(d=>localStorage.token=d.token)}
function addListing(){fetch(API+"/listing",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({title:title.value,price:price.value,image:img.value,category:cat.value,owner:email.value})})}

function load(){
fetch(API+"/listing").then(r=>r.json()).then(data=>{
list.innerHTML="";
data.filter(x=>x.title.toLowerCase().includes(search.value.toLowerCase())).forEach(d=>{
list.innerHTML+=`<div class='card'>
<img src='${d.image}'>
<h3>${d.title}</h3>
<p>${d.price} TL</p>
<button onclick="fav('${d._id}')">❤️</button>
</div>`
})})}

function fav(id){fetch(API+"/fav",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email.value,id})})}

load();
</script>

</body>
</html>
